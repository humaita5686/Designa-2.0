<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Designações de Departamentos</title>
  <!-- Importação da fonte Cabin -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Cabin', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* Barra de ferramentas flutuante na tela (Não sai na impressão) */
    .control-bar {
      margin-top: 15px;
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      gap: 10px;
    }
    .add-card-btn, .sync-btn {
      background-color: #85581A;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Cabin', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .add-card-btn:hover, .sync-btn:hover {
      background-color: #634113;
    }
    .sync-btn {
      background-color: #2563eb;
    }
    .sync-btn:hover {
      background-color: #1d4ed8;
    }

    /* Dimensões rígidas da folha A4 */
    .a4-page {
      width: 210mm;
      height: 297mm;
      background-color: #ffffff;
      padding: 10mm 10mm 20mm 10mm;
      margin: 15px auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    /* Alinhamento do Título Principal */
    .title-container {
      text-align: center;
      margin-bottom: 18px;
    }
    .title-container h1 {
      font-size: 35px;
      font-weight: 700;
      color: #000000;
      margin: 0;
      padding-bottom: 6px;
      display: inline-block;
      border-bottom: 3px solid #000000;
      text-transform: uppercase;
      letter-spacing: 0px;
      width: 90%;
    }

    /* Container que gerencia a distribuição vertical automática dos cards */
    .cards-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px; 
      min-height: 0; 
    }

    /* Estrutura dos Cards de Semana */
    .card {
      background-color: #fdf1d3; 
      border-radius: 40px;
      padding: 0px 10px 10px 10px;
      width: 100%;
      border: 1px solid rgba(133, 88, 26, 0.15);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1; 
      transition: all 0.2s ease;
      box-shadow: 5px 5px 10px 0px rgba(0, 0, 0, 0.3);
    }

    /* Título da Semana interno do Card */
    .card-title {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #634113; 
      margin-top: 15px;
      margin-bottom: 25px;
    }

    /* Divisão em duas colunas principais de designações */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 30px;
      row-gap: 6px;
      padding: 0 25px; 
    }

    /* Alinhamento Avançado: Transforma a linha em um mini-grid de 3 partes */
    .assignment-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr; /* Esquerda (Função), Centro (:), Direita (Nome) */
      align-items: center;
      font-size: 18px;
      color: #3d2411;
      line-height: 1.4;
    }
    
    /* 1. Função alinhada à esquerda */
    .assignment-row strong {
      color: #85581A; 
      font-weight: 600;
      text-align: right;
    }
    
    /* 2. O ponto ":" cravado estático bem no centro */
    .assignment-row .colon {
      color: #85581A;
      font-weight: 600;
      padding: 0 3px 0 0;
      text-align: center;
      user-select: none; /* Impede seleção acidental */
    }
    
    /* 3. Nome dos irmãos alinhado à direita */
    .assignment-row .brother-name {
      text-align: left;
    }

    /* Espaçamento entre blocos específicos */
    .space-below {
      margin-bottom: 8px;
    }

    /* Botão de excluir card individual */
    .remove-card-btn {
      position: absolute;
      top: 12px;
      right: 15px;
      background: none;
      border: none;
      color: #b91c1c;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      opacity: 0.2;
      transition: opacity 0.2s;
    }
    .remove-card-btn:hover {
      opacity: 1;
    }

    /* Edição viva em tela */
    [contenteditable="true"]:focus {
      outline: 1px dashed #85581A;
      background-color: rgba(255, 255, 255, 0.6);
      border-radius: 3px;
    }

    /* Estado de carregamento */
    .loading-msg {
      text-align: center;
      font-size: 18px;
      color: #85581A;
      padding: 40px;
      font-weight: 500;
    }

    /* Configurações de Impressão */
    .no-print {
      display: inline-block;
    }
    @media print {
      body {
        background-color: transparent;
      }
      .control-bar, .no-print {
        display: none !important;
      }
      .a4-page {
        box-shadow: none;
        padding: 15mm 16mm;
        margin: 0;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>

  <!-- Barra superior para controle em tela -->
  <div class="control-bar no-print">
    <button class="sync-btn" onclick="buscarDadosDaPlanilha()">🔄 Atualizar Planilha</button>
    <button class="add-card-btn" onclick="adicionarNovaSemana()">+ Adicionar Card Manual</button>
  </div>

  <div class="a4-page">
    
    <!-- Título Principal com Linha -->
    <div class="title-container">
      <h1 contenteditable="true">DESIGNAÇÕES DE DEPARTAMENTOS</h1>
    </div>

    <!-- Área dos Cards Semanais (Gerados Dinamicamente) -->
    <div class="cards-container" id="cards-container">
      <div class="loading-msg">Carregando dados da planilha...</div>
    </div>
  </div>

  <script>
    // URL do CSV da sua planilha pública do Google Drive
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBuS_Qe2LkVH7QEPbSvoFn50e7I71Waljbuk8b2UR1wxGkYZMoeEZUy7Moy1DF4pMfRlRsn0tyNDu4/pub?output=csv";

    // Mapeamento das colunas da sua Planilha
    const MAPA_COLUNAS = {
      semana: 0,
      audioVideo: 1,
      palco: 2,
      microfone1: 3,
      microfone2: 4,
      presidencia: 7,
      leitor: 12,
      indicadorInterno: 5,
      indicadorExterno: 6
    };

    // Executa automaticamente ao abrir a página
    window.onload = buscarDadosDaPlanilha;

    async function buscarDadosDaPlanilha() {
      const container = document.getElementById('cards-container');
      container.innerHTML = '<div class="loading-msg">Carregando dados da planilha...</div>';

      try {
        const resposta = await fetch(CSV_URL);
        if (!resposta.ok) throw new Error("O Google retornou um status de erro: " + resposta.status);
        
        const textoCSV = await resposta.text();
        const linhas = processarCSV(textoCSV);

        // Limpa o container para colocar os novos cards
        container.innerHTML = '';

        if (linhas.length <= 1) {
          container.innerHTML = '<div class="loading-msg">Nenhum dado encontrado na planilha.</div>';
          return;
        }

        // Contador para limitar a exibição em no máximo 4 cards
        let cardsExibidos = 0;

        // Ignora a primeira linha (cabeçalho) e itera pelas linhas de dados
        for (let i = 1; i < linhas.length; i++) {
          const col = linhas[i];
          
          // Pula se a linha inteira for inválida ou sem a coluna da semana
          if (!col || col.length === 0 || !col[MAPA_COLUNAS.semana]) continue;

          // Se já renderizou 4 cards, interrompe o loop completamente
          if (cardsExibidos >= 4) {
            break;
          }

          // Extrai os dados com base no mapeamento configurado de forma segura
          const dadosCard = {
            semana: col[MAPA_COLUNAS.semana] || "00/00 a 00/00",
            audioVideo: col[MAPA_COLUNAS.audioVideo] || "",
            palco: col[MAPA_COLUNAS.palco] || "",
            mic1: col[MAPA_COLUNAS.microfone1] || "",
            mic2: col[MAPA_COLUNAS.microfone2] || "",
            presidencia: col[MAPA_COLUNAS.presidencia] || "",
            leitor: col[MAPA_COLUNAS.leitor] || "",
            indInterno: col[MAPA_COLUNAS.indicadorInterno] || "",
            indExterno: col[MAPA_COLUNAS.indicadorExterno] || ""
          };

          criarCardNaTela(dadosCard);
          
          // Incrementa o contador de cards gerados com sucesso
          cardsExibidos++;
        }

      } catch (erro) {
        console.error("Erro detalhado:", erro);
        container.innerHTML = `
          <div class="loading-msg" style="color: red; text-align: left; max-width: 600px; margin: 20px auto; font-size: 16px; line-height: 1.5;">
            <strong>⚠️ Falha Crítica na Sincronização</strong><br><br>
            <strong>Detalhes do erro capturado:</strong><br>
            <code style="background: #fee2e2; padding: 4px 8px; border-radius: 4px; font-family: monospace; display: block; margin: 8px 0; word-break: break-all;">${erro.name}: ${erro.message}</code>
          </div>
        `;
      }
    }

    // Função inteligente: Trata quebra de linhas e detecta automaticamente o divisor do CSV (, ou ;)
    function processarCSV(texto) {
      const linhas = text = texto.split(/\r?\n/);
      
      const primeiraLinha = linhas[0] || "";
      const divisor = (primeiraLinha.split(';').length > primeiraLinha.split(',').length) ? ';' : ',';

      return linhas.map(linha => {
        const regex = new RegExp(`${divisor}(?=(?:(?:[^"]*"){2})*[^"]*$)`);
        return linha.split(regex).map(celula => 
          celula ? celula.replace(/^"|"$/g, '').trim() : ""
        );
      });
    }

    // Função auxiliar para criar a estrutura HTML
    function criarCardNaTela(dados) {
      const container = document.getElementById('cards-container');
      const novoCard = document.createElement('div');
      novoCard.className = 'card';
      
      // ADICIONADO "Semana:" antes de exibir o valor da data
      novoCard.innerHTML = `
        <button class="remove-card-btn no-print" onclick="this.closest('.card').remove()" title="Remover este card">✕</button>
        <div class="card-title" contenteditable="true">Semana ${dados.semana}</div>
        <div class="card-grid">
          <div class="card-col">
            <div class="assignment-row"><strong contenteditable="true">Áudio e Vídeo</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.audioVideo}</span></div>
            <div class="assignment-row space-below"><strong contenteditable="true">Palco</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.palco}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Microfone</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.mic1}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Microfone</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.mic2}</span></div>
          </div>
          <div class="card-col">
            <div class="assignment-row"><strong contenteditable="true">Presidência</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.presidencia}</span></div>
            <div class="assignment-row space-below"><strong contenteditable="true">Leitor A Sentinela</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.leitor}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Indicador Interno</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.indInterno}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Indicador Externo</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.indExterno}</span></div>
          </div>
        </div>
      `;
      
      container.appendChild(novoCard);
    }

    // Mantém a função manual ativa para emergências
    function adicionarNovaSemana() {
      if(document.getElementById('cards-container').children.length >= 6) {
        alert("O limite sugerido para a folha A4 vertical é de até 6 cards para manter a leitura nítida.");
      }
      criarCardNaTela({
        semana: "00/00 a 00/00", audioVideo: "Nome", palco: "Nome", mic1: "Nome", mic2: "Nome", presidencia: "Nome", leitor: "Nome", indInterno: "Nome", indExterno: "Nome"
      });
    }
  </script>

</body>
</html>
