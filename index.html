<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designações de Departamentos</title>
  
  <!-- Importação da fonte Cabin -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Cabin', sans-serif;
      background-color: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* --- PAINEL DE CONTROLE RESPONSIVO (TELA) --- */
    .control-bar {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 15px;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .sync-btn, .print-btn {
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Cabin', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      width: 100%;
      text-align: center;
    }
    
    .sync-btn { background-color: #4b5563; }
    .sync-btn:hover { background-color: #374151; }
    
    .print-btn { background-color: #2563eb; }
    .print-btn:hover { background-color: #1d4ed8; }

    .seletor-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #3d2411;
      width: 100%;
    }
    
    .seletor-semana {
      font-family: 'Cabin', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #85581A;
      color: #3d2411;
      background-color: white;
      cursor: pointer;
      outline: none;
      width: 100%;
    }

    /* --- LAYOUT ADAPTÁVEL PARA TELA DO CELULAR --- */
    .a4-page {
      width: 100%;
      max-width: 600px;
      background-color: #ffffff;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .title-container {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .title-container h1 {
      font-size: 30px;
      font-weight: 600;
      color: #000000;
      padding-bottom: 6px;
      display: inline-block;
      border-bottom: 3px solid #000000;
      text-transform: uppercase;
      width: 100%;
    }

    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 15px; 
    }

    /* Estrutura dos Cards de Semana */
    .card {
      background-color: #fdf1d3; 
      border-radius: 25px;
      padding: 15px 10px;
      width: 100%;
      border: 1px solid rgba(133, 88, 26, 0.15);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 4px 4px 8px 0px rgba(0, 0, 0, 0.2);
    }

    .card-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #634113; 
      margin-bottom: 15px;
    }

    /* Grid empilhado em telas móveis */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      row-gap: 12px;
      padding: 0 5px; 
    }
    
    .card-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .assignment-row {
      display: grid;
      grid-template-columns: 1.2fr auto 1.4fr;
      align-items: center;
      font-size: 15px;
      color: #3d2411;
      line-height: 1.4;
    }
    
    .assignment-row strong {
      color: #85581A; 
      font-weight: 600;
      text-align: right;
    }
    
    .assignment-row .colon {
      color: #85581A;
      font-weight: 600;
      padding: 0 4px;
      text-align: center;
      user-select: none;
    }
    
    .assignment-row .brother-name {
      text-align: left;
      word-break: break-word;
    }

    .space-below {
      margin-bottom: 0px; /* Desativado no mobile para manter coesão */
    }

    .remove-card-btn {
      position: absolute;
      top: 12px;
      right: 15px;
      background: none;
      border: none;
      color: #b91c1c;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      opacity: 0.4;
    }

    [contenteditable="true"]:focus {
      outline: 2px dashed #85581A;
      background-color: rgba(255, 255, 255, 0.6);
      border-radius: 3px;
    }

    .loading-msg {
      text-align: center;
      font-size: 16px;
      color: #85581A;
      padding: 30px;
      font-weight: 500;
    }

    .no-print { display: flex; }

    /* --- 🖥️ AJUSTE PARA TELAS GRANDES (DESKTOP) --- */
    @media (min-width: 850px) {
      body { padding: 20px 0; }
      .control-bar { 
        max-width: 210mm; 
        flex-direction: row; 
        align-items: center; 
        justify-content: space-between;
        gap: 20px;
      }
      .sync-btn, .print-btn { width: auto; }
      .seletor-container { flex-direction: row; align-items: center; width: auto; }
      .seletor-semana { width: 220px; }
      
      .a4-page {
        width: 210mm;
        height: 297mm;
        max-width: none;
        padding: 10mm 10mm 20mm 10mm;
      }
      .title-container { margin-bottom: 18px; }
      .title-container h1 { font-size: 35px; width: 90%; }
      .cards-container { flex: 1; gap: 20px; min-height: 0; }
      .card { border-radius: 40px; padding: 0px 10px 10px 10px; flex: 1; box-shadow: 5px 5px 10px 0px rgba(0, 0, 0, 0.3); }
      .card-title { font-size: 30px; margin-top: 15px; margin-bottom: 25px; }
      .card-grid { grid-template-columns: 1fr 1fr; column-gap: 30px; row-gap: 6px; padding: 0 25px; }
      .assignment-row { font-size: 18px; grid-template-columns: 1fr auto 1fr; }
      .space-below { margin-bottom: 8px; }
      .remove-card-btn { opacity: 0.2; font-size: 16px; }
    }

    /* --- 🖨️ CONFIGURAÇÕES DE IMPRESSÃO RÍGIDA A4 --- */
    @media print {
      body { background-color: transparent; padding: 0; }
      .control-bar, .no-print { display: none !important; }
      .a4-page {
        width: 210mm !important;
        height: 297mm !important;
        max-width: none !important;
        box-shadow: none !important;
        padding: 15mm 16mm !important;
        margin: 0 !important;
        page-break-after: always;
      }
      .title-container { margin-bottom: 18px !important; }
      .title-container h1 { font-size: 35px !important; width: 90% !important; display: inline-block !important; }
      .cards-container { flex: 1 !important; gap: 20px !important; min-height: 0 !important; display: flex !important; flex-direction: column !important; }
      .card { border-radius: 40px !important; padding: 0px 10px 10px 10px !important; flex: 1 !important; display: flex !important; flex-direction: column !important; box-shadow: 5px 5px 10px 0px rgba(0, 0, 0, 0.3) !important; }
      .card-title { font-size: 30px !important; margin-top: 15px !important; margin-bottom: 25px !important; }
      .card-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; column-gap: 30px !important; row-gap: 6px !important; padding: 0 25px !important; }
      .assignment-row { font-size: 18px !important; grid-template-columns: 1fr auto 1fr !important; }
      .space-below { margin-bottom: 8px !important; }
    }
  </style>
</head>
<body>

  <!-- Painel unificado para controle e impressão em tela -->
  <div class="control-bar no-print">
    <div style="display: flex; gap: 10px; flex-grow: 1; flex-wrap: wrap;">
      <button class="sync-btn" style="flex: 1; min-width: 160px;" onclick="buscarDadosDaPlanilha()">🔄 Atualizar Planilha</button>
      <button class="print-btn" style="flex: 1; min-width: 160px;" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
    </div>
    
    <div class="seletor-container">
      <span>📅 Mostrar a partir da:</span>
      <select id="semana-select" class="seletor-semana" onchange="mudarSemanaInicial()">
        <option value="">Carregando semanas...</option>
      </select>
    </div>
  </div>

  <div class="a4-page">
    
    <!-- Título Principal com Linha -->
    <div class="title-container">
      <h1 contenteditable="true">DESIGNAÇÃO SEMANAL</h1>
    </div>

    <!-- Área dos Cards Semanais (Gerados Dinamicamente) -->
    <div class="cards-container" id="cards-container">
      <div class="loading-msg">Carregando dados da planilha...</div>
    </div>
  </div>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBuS_Qe2LkVH7QEPbSvoFn50e7I71Waljbuk8b2UR1wxGkYZMoeEZUy7Moy1DF4pMfRlRsn0tyNDu4/pub?output=csv";

    const MAPA_COLUNAS = {
      semana: 0,
      audioVideo: 1,
      palco: 2,
      microfone1: 3,
      microfone2: 4,
      presidencia: 7,
      leitor: 8,
      indicadorInterno: 5,
      indicadorExterno: 6
    };

    let todasAsLinhasValidas = [];

    window.onload = buscarDadosDaPlanilha;

    async function buscarDadosDaPlanilha() {
      const container = document.getElementById('cards-container');
      const seletor = document.getElementById('semana-select');
      container.innerHTML = '<div class="loading-msg">Carregando dados da planilha...</div>';
      seletor.innerHTML = '<option value="">Carregando semanas...</option>';

      try {
        const resposta = await fetch(CSV_URL);
        if (!resposta.ok) throw new Error("O Google retornou um status de erro: " + resposta.status);
        
        const textoCSV = await resposta.text();
        const linhasRaw = processarCSV(textoCSV);

        todasAsLinhasValidas = [];

        if (linhasRaw.length <= 1) {
          container.innerHTML = '<div class="loading-msg">Nenhum dado encontrado na planilha.</div>';
          return;
        }

        for (let i = 1; i < linesRaw = linhasRaw.length; i++) {
          const col = linhasRaw[i];
          if (col && col.length > 0 && col[MAPA_COLUNAS.semana]) {
            todasAsLinhasValidas.push(col);
          }
        }

        seletor.innerHTML = '';
        todasAsLinhasValidas.forEach((col, index) => {
          const opcao = document.createElement('option');
          opcao.value = index;
          opcao.textContent = "Semana: " + col[MAPA_COLUNAS.semana];
          seletor.appendChild(opcao);
        });

        renderizarCardsIniciandoEm(0);

      } catch (erro) {
        console.error("Erro detalhado:", erro);
        container.innerHTML = `
          <div class="loading-msg" style="color: red; text-align: left; max-width: 600px; margin: 20px auto; font-size: 16px; line-height: 1.5;">
            <strong>⚠️ Falha Crítica na Sincronização</strong><br><br>
            <strong>Detalhes do erro capturado:</strong><br>
            <code style="background: #fee2e2; padding: 4px 8px; border-radius: 4px; font-family: monospace; display: block; margin: 8px 0; word-break: break-all;">${erro.name}: ${erro.message}</code>
          </div>
        `;
      }
    }

    function mudarSemanaInicial() {
      const seletor = document.getElementById('semana-select');
      const indiceEscolhido = parseInt(seletor.value, 10) || 0;
      renderizarCardsIniciandoEm(indiceEscolhido);
    }

    function renderizarCardsIniciandoEm(indiceInicial) {
      const container = document.getElementById('cards-container');
      container.innerHTML = '';

      if (todasAsLinhasValidas.length === 0) {
        container.innerHTML = '<div class="loading-msg">Nenhuma linha válida para exibir.</div>';
        return;
      }

      let cardsExibidos = 0;

      for (let i = indiceInicial; i < todasAsLinhasValidas.length; i++) {
        if (cardsExibidos >= 4) break;

        const col = todasAsLinhasValidas[i];

        const dadosCard = {
          semana: col[MAPA_COLUNAS.semana] || "00/00 a 00/00",
          audioVideo: col[MAPA_COLUNAS.audioVideo] || "",
          palco: col[MAPA_COLUNAS.palco] || "",
          mic1: col[MAPA_COLUNAS.microfone1] || "",
          mic2: col[MAPA_COLUNAS.microfone2] || "",
          presidencia: col[MAPA_COLUNAS.presidencia] || "",
          leitor: col[MAPA_COLUNAS.leitor] || "",
          indInterno: col[MAPA_COLUNAS.indicadorInterno] || "",
          indExterno: col[MAPA_COLUNAS.indicadorExterno] || ""
        };

        criarCardNaTela(dadosCard);
        cardsExibidos++;
      }
    }

    function processarCSV(texto) {
      const linhas = texto.split(/\r?\n/);
      const primeiraLinha = linhas[0] || "";
      const divisor = (primeiraLinha.split(';').length > primeiraLinha.split(',').length) ? ';' : ',';

      return linhas.map(linha => {
        const regex = new RegExp(`${divisor}(?=(?:(?:[^"]*"){2})*[^"]*$)`);
        return linha.split(regex).map(celula => 
          celula ? celula.replace(/^"|"$/g, '').trim() : ""
        );
      });
    }

    function criarCardNaTela(dados) {
      const container = document.getElementById('cards-container');
      const novoCard = document.createElement('div');
      novoCard.className = 'card';
      
      novoCard.innerHTML = `
        <button class="remove-card-btn no-print" onclick="this.closest('.card').remove()" title="Remover este card">✕</button>
        <div class="card-title" contenteditable="true">Semana ${dados.semana}</div>
        <div class="card-grid">
          <div class="card-col">
            <div class="assignment-row"><strong contenteditable="true">Áudio e Vídeo</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.audioVideo}</span></div>
            <div class="assignment-row space-below"><strong contenteditable="true">Palco</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.palco}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Microfone</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.mic1}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Microfone</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.mic2}</span></div>
          </div>
          <div class="card-col">
            <div class="assignment-row"><strong contenteditable="true">Presidência</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.presidencia}</span></div>
            <div class="assignment-row space-below"><strong contenteditable="true">Leitor A Sentinela</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.leitor}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Indicador Interno</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.indInterno}</span></div>
            <div class="assignment-row"><strong contenteditable="true">Indicador Externo</strong><span class="colon">:</span><span class="brother-name" contenteditable="true">${dados.indExterno}</span></div>
          </div>
        </div>
      `;
      
      container.appendChild(novoCard);
    }
  </script>

</body>
</html>
